{% extends "base.html" %}
{% block content %}
    <h2>Registrar Nuevo Empleado</h2>
    
    <form method="POST" style="max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; border: 1px solid #eee;">
        <div style="margin-bottom: 15px;">
            <label>Nombre de Usuario:</label>
            <input type="text" name="nombre" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Contraseña:</label>
            <input type="password" name="password" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Rol:</label>
            <select name="rol" style="width: 100%; padding: 8px; margin-top: 5px;">
                <option value="empleado">Empleado</option>
                <option value="admin">Administrador</option>
            </select>
        </div>
        <button type="submit" class="btn btn-entrada" style="width: 100%;">Crear Usuario</button>
        <br><br>
        <a href="/admin/panel" style="display: block; text-align: center; color: #666;">Cancelar</a>
    </form>
{% endblock %}
