{% extends "base.html" %}

{% block content %}
<style>
    .registro-container {
        width: 100%;
        max-width: 800px; /* Ancho suficiente para dos columnas */
        margin: 20px auto;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr; /* Dos columnas iguales */
        gap: 15px 20px;
        text-align: left;
    }

    /* Campos que deben ocupar todo el ancho */
    .full-width {
        grid-column: span 2;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        font-size: 0.9rem;
        font-weight: 700;
        margin-bottom: 5px;
        color: #1e293b;
    }

    /* Ajuste para que el botón no se descuadre */
    .submit-area {
        margin-top: 30px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
</style>

<div class="login-wrapper">
    <div class="registro-container">
        <div class="card">
            <h2 style="margin-bottom: 2rem; color: #1e293b; font-weight: 700;">Registrar Nuevo Empleado</h2>
            
            <form method="POST">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombre:</label>
                        <input type="text" name="nombre" class="form-input" placeholder="Ej: Joaquín" required autofocus>
                    </div>
                    <div class="form-group">
                        <label>Apellidos:</label>
                        <input type="text" name="apellidos" class="form-input" placeholder="Ej: García Pérez">
                    </div>

                    <div class="form-group">
                        <label>DNI o NIE:</label>
                        <input type="text" name="dni" class="form-input" placeholder="12345678X" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña Inicial:</label>
                        <input type="password" name="password" class="form-input" placeholder="Contraseña segura" required>
                    </div>

                    <div class="form-group">
                        <label>Correo Electrónico:</label>
                        <input type="email" name="email" class="form-input" placeholder="empleado@correo.com">
                    </div>
                    <div class="form-group">
                        <label>Teléfono:</label>
                        <input type="text" name="telefono" class="form-input" placeholder="600 000 000">
                    </div>

                    <div class="form-group full-width">
                        <label>Dirección completa:</label>
                        <input type="text" name="direccion" class="form-input" placeholder="Calle, Número, Piso, Ciudad">
                    </div>

                    <div class="form-group">
                        <label>Nº Seguridad Social (NASS):</label>
                        <input type="text" name="nass" class="form-input" placeholder="Obligatorio" required>
                    </div>
                    <div class="form-group">
                        <label>Horas Semanales:</label>
                        <input type="number" name="horas_contratadas" step="0.5" class="form-input" value="40.0" required>
                    </div>

                    <div class="form-group full-width">
                        <label>Rol del Sistema:</label>
                        <select name="rol" class="form-input">
                            <option value="empleado">Empleado</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                </div>

                <div class="submit-area">
                    <button type="submit" class="btn btn-entrada" style="width: 100%; font-size: 1rem; padding: 18px;">
                        CREAR NUEVO USUARIO
                    </button>
                    
                    <a href="{{ url_for('admin_panel') }}" class="link-secundario">
                        ← Cancelar y volver al panel
                    </a>
                </div>
            </form>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alerta-error" style="margin-top: 20px;">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>
    </div>
</div>
{% endblock %}
