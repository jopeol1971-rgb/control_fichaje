{% extends "base.html" %}
{% block content %}
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>

    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        
        <div style="flex: 1; min-width: 300px;">
            <h2>Registro de Jornada</h2>
            <div id="reloj" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; color: #333;"></div>
            <p>Estado: <strong>{{ estado | capitalize }}</strong> | Usuario: <strong>{{ user.nombre }}</strong></p>
            
            <div style="margin-bottom: 20px;">
                <form action="/fichar/entrada" method="POST" style="display: inline;">
    <button type="submit" class="btn btn-entrada" {% if estado == 'entrada' %} disabled {% endif %}>Entrada</button>
</form>

<form action="/fichar/descanso" method="POST" style="display: inline;">
    <button type="submit" class="btn btn-descanso" {% if estado != 'entrada' %} disabled {% endif %}>Pausa</button>
</form>

<form action="/fichar/salida" method="POST" style="display: inline;">
    <button type="submit" class="btn btn-salida" {% if estado != 'entrada' and estado != 'descanso' %} disabled {% endif %}>Salida</button>
</form>
            </div>
            <a href="/logout" style="color: #666; font-size: 0.9rem;">Cerrar sesión</a>
        </div>

        <div style="flex: 1.5; min-width: 300px; background: white; padding: 15px; border-radius: 8px; border: 1px solid #eee;">
            <div id="calendar"></div>
        </div>
    </div>

    <script>
        // Lógica del Reloj
        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.toLocaleTimeString('es-ES');
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        // Lógica del Calendario
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                height: 450,
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: ''
                },
                events: [
                    {% for registro in historial %}
                    {
                        title: '{{ registro.tipo | capitalize }}',
                        start: '{{ registro.timestamp.strftime("%Y-%m-%dT%H:%M:%S") }}',
                        color: '{% if registro.tipo == "entrada" %}#28a745{% elif registro.tipo == "descanso" %}#ffc107{% else %}#dc3545{% endif %}',
                        allDay: false
                    },
                    {% endfor %}
                ],
                eventTimeFormat: { // Formato de hora 24h
                    hour: '2-digit',
                    minute: '2-digit',
                    meridiem: false,
                    hour12: false
                }
            });
            calendar.render();
        });
    </script>
{% endblock %}
