<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Jornada</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; margin: 5px; color: white; }
        .btn-entrada { background: #28a745; }
        .btn-salida { background: #dc3545; }
        .btn-descanso { background: #ffc107; color: black; }
        .mensaje { color: #555; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Registro de Jornada</h2>
        <p>Usuario: <strong>Empleado Test</strong></p>
        
        <form action="/fichar/entrada" method="POST" style="display: inline;">
            <button type="submit" class="btn btn-entrada">Entrada</button>
        </form>

        <form action="/fichar/descanso" method="POST" style="display: inline;">
            <button type="submit" class="btn btn-descanso">Pausa</button>
        </form>

        <form action="/fichar/salida" method="POST" style="display: inline;">
            <button type="submit" class="btn btn-salida">Salida</button>
        </form>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <p class="mensaje">{{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}
    </div>
</body>
</html>
